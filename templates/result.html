{% extends 'base.html' %} 
{% block title %}Generated Schema - SchemaGen{% endblock %} 
 
{% block content %} 
<div class="max-w-4xl mx-auto px-6 py-12 w-full"> 
    <div class="text-center mb-10"> 
        <div class="w-20 h-20 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-lg shadow-emerald-500/20 animate-pulse">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="text-3xl font-bold text-white mb-3">Schema Generated Successfully!</h1> 
        <p class="text-slate-400 text-lg">Your <strong class="text-brand-300">{{ schema_type.upper() }}</strong> JSON-LD is ready for use on your website.</p> 
    </div> 
 
    <div class="glass-card rounded-2xl overflow-hidden border border-slate-700/50 shadow-2xl"> 
        <div class="bg-slate-900/80 px-6 py-4 flex justify-between items-center border-b border-slate-700/50"> 
            <span class="text-sm font-semibold text-slate-300 flex items-center gap-2">
                <i class="fas fa-code text-brand-400"></i> JSON-LD Output
            </span> 
            <button id="copy-btn" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 border border-slate-700 hover:border-brand-500/50">
                <i class="fas fa-copy"></i> <span>Copy Code</span>
            </button> 
        </div> 
        <div class="p-6 bg-black/40 overflow-auto max-h-[60vh]">
            <pre id="json-output"><code class="text-brand-300 font-mono text-sm leading-relaxed">{{ json_data | safe }}</code></pre> 
        </div>
    </div> 
 
    <div class="mt-10 flex justify-center gap-6"> 
        <a href="{{ url_for('select_schema') }}" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-semibold py-3 px-8 rounded-xl transition-all hover:border-slate-500">
            Generate Another
        </a> 
        <form action="{{ url_for('validate') }}" method="POST" class="inline">
            <input type="hidden" name="json_content" value="{{ json_data }}">
            <button type="submit" class="bg-brand-500 hover:bg-brand-600 text-white font-semibold py-3 px-8 rounded-xl shadow-lg shadow-brand-500/25 transition-all hover:-translate-y-0.5 flex items-center gap-2">
                Validate This Schema <i class="fas fa-arrow-right"></i>
            </button>
        </form>
    </div> 
</div> 
 
<script> 
    document.getElementById('copy-btn').addEventListener('click', function () { 
        const code = document.getElementById('json-output').innerText; 
        const btn = this;
        navigator.clipboard.writeText(code).then(() => { 
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check text-emerald-400"></i> <span class="text-emerald-400">Copied!</span>'; 
            btn.classList.add('border-emerald-500/50', 'bg-emerald-500/10');
            setTimeout(() => { 
                btn.innerHTML = originalHTML; 
                btn.classList.remove('border-emerald-500/50', 'bg-emerald-500/10');
            }, 2000); 
        }); 
    }); 
</script> 
{% endblock %}
