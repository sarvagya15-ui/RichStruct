{% extends 'base.html' %}

{% block title %}Course Schema Generator - SchemaGen{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="form-header">
        <a href="{{ url_for('select_schema') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to
            selection</a>
        <h1><i class="fas fa-graduation-cap"></i> Course Schema Generator</h1>
        <p>Define your educational courses for Google Rich Results.</p>
    </div>

    <form action="{{ url_for('generate_jsonld', schema_type='course') }}" method="POST" class="schema-form">
        <div class="form-section">
            <h3>Course Details</h3>
            <div class="form-group">
                <label for="name">Course Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="e.g. Full Stack Web Development" required>
            </div>
            <div class="form-group">
                <label for="description">Course Description <span class="required">*</span></label>
                <textarea id="description" name="description"
                    placeholder="A detailed summary of what the course covers..." required></textarea>
            </div>
        </div>

        <div class="form-section">
            <h3>Provider Information</h3>
            <div class="form-group">
                <label for="provider_name">Provider Name <span class="required">*</span></label>
                <input type="text" id="provider_name" name="provider_name" placeholder="e.g. Coursera or Code Academy"
                    required>
            </div>
            <div class="form-group">
                <label for="provider_url">Provider Website URL</label>
                <input type="url" id="provider_url" name="provider_url" placeholder="https://example.com/provider">
            </div>
        </div>

        <button type="submit" class="btn-submit">Generate JSON-LD <i class="fas fa-magic"></i></button>
    </form>
</div>

<style>
    /* Using common styles from shared CSS */
    .form-wrapper {
        max-width: 800px;
        margin: 2rem auto;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--primary);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        font-weight: 500;
    }

    .form-header h1 {
        font-size: 2rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .schema-form {
        background: var(--card);
        padding: 2.5rem;
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .form-section {
        margin-bottom: 2.5rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .form-section h3 {
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
        color: var(--primary);
        text-transform: uppercase;
    }

    .required {
        color: var(--danger);
    }

    textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #0f172a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.5rem;
        color: white;
        min-height: 100px;
        outline: none;
    }

    input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #0f172a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.5rem;
        color: white;
        outline: none;
    }

    .btn-submit {
        width: 100%;
        padding: 1rem;
        background: var(--primary);
        border: none;
        border-radius: 0.5rem;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-submit:hover {
        background: var(--primary-hover);
    }
</style>
{% endblock %}
