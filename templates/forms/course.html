{% extends 'base.html' %}
{% block title %}Generate Course Schema — RichStruct{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12 w-full">
  <div class="mb-8">
    <a href="{{ url_for('select_schema') }}" class="text-slate-400 hover:text-white transition-colors inline-flex items-center text-sm font-medium">
      <i class="fas fa-arrow-left mr-2"></i> Back to Schemas
    </a>
  </div>

  <div class="glass-card p-10 rounded-3xl relative overflow-hidden">
    <div class="absolute -top-32 -right-32 w-64 h-64 bg-brand-500/20 rounded-full blur-[60px] pointer-events-none"></div>

    <div class="relative z-10">
      <div class="flex items-center gap-4 mb-8 border-b border-slate-700/50 pb-6">
        <div class="w-12 h-12 rounded-xl bg-purple-500/20 text-purple-400 flex items-center justify-center text-xl">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <div>
          <h2 class="text-2xl font-bold text-white">Course Schema</h2>
          <p class="text-sm text-slate-400">Generate rich snippets for educational content</p>
        </div>
      </div>
      
      <form action="{{ url_for('generate_jsonld', schema_type='course') }}" method="POST" class="space-y-6">

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Course Name</label>
          <input type="text" name="name" placeholder="e.g. Advanced Machine Learning" required
                 class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Description</label>
          <textarea name="description" placeholder="A brief description of the course." required
                    class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all h-32 resize-none"></textarea>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Provider Name</label>
            <input type="text" name="provider_name" placeholder="e.g. Coursera" required
                   class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Provider URL</label>
            <input type="url" name="provider_url" placeholder="https://example.com" required
                   class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
          </div>
        </div>

        <button type="submit" class="w-full bg-brand-500 text-white font-semibold py-4 px-4 rounded-xl shadow-lg shadow-brand-500/25 hover:bg-brand-600 hover:-translate-y-0.5 transition-all mt-8 flex justify-center items-center gap-2">
          <i class="fas fa-magic"></i> Generate Schema
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
