{% extends 'base.html' %}

{% block title %}FAQ Schema Generator - SchemaGemPro{% endblock %}

{% block content %}
<div class="animate-fade-in-up max-w-4xl mx-auto">
    <div class="mb-10 text-center">
        <a href="{{ url_for('select_schema') }}" class="inline-flex items-center gap-2 text-indigo-400 hover:text-indigo-300 font-medium mb-6 transition-colors">
            <i class="fas fa-arrow-left"></i> Back to selection
        </a>
        <h1 class="text-3xl font-extrabold text-white tracking-tight flex items-center justify-center gap-3 mb-3">
            <i class="fas fa-question-circle text-emerald-500"></i> FAQ Schema Generator
        </h1>
        <p class="text-slate-400">Add questions and answers to generate a Google-compliant FAQPage JSON-LD.</p>
    </div>

    <form action="{{ url_for('generate_jsonld', schema_type='faq') }}" method="POST" class="bg-slate-900/60 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden">
        <!-- Mac-style Terminal Header -->
        <div class="w-full px-6 py-4 bg-slate-950/40 border-b border-white/5 flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full bg-rose-500/80"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-amber-500/80"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-emerald-500/80"></div>
            <span class="text-[10px] font-mono text-slate-500 ml-auto uppercase tracking-wider">faq_builder.exe</span>
        </div>
        
        <div class="p-8">
        
        <div id="faq-container" class="space-y-6 mb-8">
            <div class="faq-item bg-slate-950/50 border border-white/10 rounded-2xl p-6 relative group">
                <button type="button" class="remove-faq absolute top-4 right-4 text-slate-500 hover:text-rose-500 transition-colors" title="Remove Question">
                    <i class="fas fa-times"></i>
                </button>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-emerald-400 mb-2">Question <span class="text-rose-500">*</span></label>
                    <input type="text" name="question[]" placeholder="e.g. What is your return policy?" required class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Answer <span class="text-rose-500">*</span></label>
                    <textarea name="answer[]" placeholder="Provide a clear answer..." required class="w-full h-24 bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors resize-none"></textarea>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-4">
            <button type="button" id="add-faq" class="w-full sm:w-1/2 bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-xl font-semibold transition-colors flex items-center justify-center gap-2 border border-white/10">
                <i class="fas fa-plus"></i> Add Another Question
            </button>
            <button type="submit" class="w-full sm:w-1/2 bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-bold text-lg shadow-[0_0_15px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(16,185,129,0.5)] transition-all flex items-center justify-center gap-2">
                Generate JSON-LD <i class="fas fa-magic"></i>
            </button>
        </div>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('add-faq').addEventListener('click', function () {
        const container = document.getElementById('faq-container');
        const newItem = document.createElement('div');
        newItem.className = 'faq-item bg-slate-950/50 border border-white/10 rounded-2xl p-6 relative group animate-fade-in-up';
        newItem.innerHTML = `
            <button type="button" class="remove-faq absolute top-4 right-4 text-slate-500 hover:text-rose-500 transition-colors" title="Remove Question">
                <i class="fas fa-times"></i>
            </button>
            <div class="mb-4">
                <label class="block text-sm font-medium text-emerald-400 mb-2">Question <span class="text-rose-500">*</span></label>
                <input type="text" name="question[]" placeholder="Next question..." required class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Answer <span class="text-rose-500">*</span></label>
                <textarea name="answer[]" placeholder="Provide a clear answer..." required class="w-full h-24 bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors resize-none"></textarea>
            </div>
        `;
        container.appendChild(newItem);

        newItem.querySelector('.remove-faq').addEventListener('click', function () {
            if (document.querySelectorAll('.faq-item').length > 1) {
                newItem.remove();
            } else {
                alert("You must have at least one FAQ item.");
            }
        });
    });

    document.querySelectorAll('.remove-faq').forEach(btn => {
        btn.addEventListener('click', function () {
            if (document.querySelectorAll('.faq-item').length > 1) {
                this.parentElement.remove();
            } else {
                alert("You must have at least one FAQ item.");
            }
        });
    });
</script>
{% endblock %}
