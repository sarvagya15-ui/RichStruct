{% extends 'base.html' %}

{% block title %}Product Schema Generator - SchemaGen{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="form-header">
        <a href="{{ url_for('select_schema') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to
            selection</a>
        <h1><i class="fas fa-shopping-cart"></i> Product Schema Generator</h1>
        <p>Fill in the details to generate a Google-compliant Product JSON-LD.</p>
    </div>

    <form action="{{ url_for('generate_jsonld', schema_type='product') }}" method="POST" class="schema-form">
        <div class="form-section">
            <h3>Basic Information</h3>
            <div class="form-group">
                <label for="name">Product Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="e.g. iPhone 15 Pro Max" required>
            </div>
            <div class="form-group">
                <label for="brand">Brand Name <span class="required">*</span></label>
                <input type="text" id="brand" name="brand" placeholder="e.g. Apple" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description"
                    placeholder="A brief description of the product..."></textarea>
            </div>
        </div>

        <div class="form-section">
            <h3>Pricing & Inventory</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price <span class="required">*</span></label>
                    <input type="number" step="0.01" id="price" name="price" placeholder="e.g. 999.00" required>
                </div>
                <div class="form-group">
                    <label for="priceCurrency">Currency <span class="required">*</span></label>
                    <select id="priceCurrency" name="priceCurrency" required>
                        <option value="USD">USD - US Dollar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="INR" selected>INR - Indian Rupee</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="availability">Availability</label>
                <select id="availability" name="availability">
                    <option value="https://schema.org/InStock">In Stock</option>
                    <option value="https://schema.org/OutOfStock">Out of Stock</option>
                    <option value="https://schema.org/PreOrder">Pre-order</option>
                </select>
            </div>
        </div>

        <div class="form-section">
            <h3>Media & URL</h3>
            <div class="form-group">
                <label for="image">Image URL <span class="required">*</span></label>
                <input type="url" id="image" name="image" placeholder="https://example.com/product.jpg" required>
            </div>
            <div class="form-group">
                <label for="url">Product Page URL</label>
                <input type="url" id="url" name="url" placeholder="https://example.com/product-page">
            </div>
        </div>

        <button type="submit" class="btn-submit">Generate JSON-LD <i class="fas fa-magic"></i></button>
    </form>
</div>

<style>
    .form-wrapper {
        max-width: 800px;
        margin: 2rem auto;
    }

    .form-header {
        margin-bottom: 2rem;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--primary);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        font-weight: 500;
    }

    .form-header h1 {
        font-size: 2rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .schema-form {
        background: var(--card);
        padding: 2.5rem;
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .form-section {
        margin-bottom: 2.5rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .form-section h3 {
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }

    .required {
        color: var(--danger);
    }

    textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #0f172a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.5rem;
        color: white;
        font-size: 1rem;
        min-height: 100px;
        outline: none;
    }

    select {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #0f172a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.5rem;
        color: white;
        font-size: 1rem;
        outline: none;
        cursor: pointer;
    }
</style>
{% endblock %}
