{% extends 'base.html' %}
{% block title %}Generate Product Schema — RichStruct{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12 w-full">
  <div class="mb-8">
    <a href="{{ url_for('select_schema') }}" class="text-slate-400 hover:text-white transition-colors inline-flex items-center text-sm font-medium">
      <i class="fas fa-arrow-left mr-2"></i> Back to Schemas
    </a>
  </div>

  <div class="glass-card p-10 rounded-3xl relative overflow-hidden">
    <div class="absolute -top-32 -right-32 w-64 h-64 bg-emerald-500/20 rounded-full blur-[60px] pointer-events-none"></div>

    <div class="relative z-10">
      <div class="flex items-center gap-4 mb-8 border-b border-slate-700/50 pb-6">
        <div class="w-12 h-12 rounded-xl bg-emerald-500/20 text-emerald-400 flex items-center justify-center text-xl">
          <i class="fas fa-shopping-cart"></i>
        </div>
        <div>
          <h2 class="text-2xl font-bold text-white">Product Schema</h2>
          <p class="text-sm text-slate-400">Generate rich snippets for e-commerce products</p>
        </div>
      </div>
      
      <form action="{{ url_for('generate_jsonld', schema_type='product') }}" method="POST" class="space-y-6">

        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Product Name</label>
            <input type="text" name="name" placeholder="e.g. Awesome Laptop" required
                   class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Brand Name</label>
            <input type="text" name="brand" placeholder="e.g. Apple" required
                   class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Description</label>
          <textarea name="description" placeholder="A brief description of the product." required
                    class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all h-32 resize-none"></textarea>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Product URL</label>
            <input type="url" name="url" placeholder="https://example.com/product" required
                   class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Image URL</label>
            <input type="url" name="image" placeholder="https://example.com/image.jpg" required
                   class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
          </div>
        </div>

        <div class="grid grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Currency</label>
            <input type="text" name="priceCurrency" placeholder="USD" required value="USD"
                   class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Price</label>
            <input type="number" step="0.01" name="price" placeholder="99.99" required
                   class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Availability</label>
            <select name="availability" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all appearance-none cursor-pointer">
              <option value="https://schema.org/InStock" class="bg-slate-800">In Stock</option>
              <option value="https://schema.org/OutOfStock" class="bg-slate-800">Out of Stock</option>
            </select>
          </div>
        </div>

        <button type="submit" class="w-full bg-brand-500 text-white font-semibold py-4 px-4 rounded-xl shadow-lg shadow-brand-500/25 hover:bg-brand-600 hover:-translate-y-0.5 transition-all mt-8 flex justify-center items-center gap-2">
          <i class="fas fa-magic"></i> Generate Schema
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
