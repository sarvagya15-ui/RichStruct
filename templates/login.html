{% extends 'base.html' %}
{% block title %}Login — RichStruct{% endblock %}

{% block content %}
<div class="flex items-center justify-center flex-grow py-12 px-4">
  <div class="w-full max-w-md">
    <div class="glass-card rounded-3xl p-10 relative overflow-hidden">
      <!-- Decorative gradient blob -->
      <div class="absolute -top-24 -right-24 w-48 h-48 bg-brand-500/30 rounded-full blur-[40px] pointer-events-none"></div>
      <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-purple-500/30 rounded-full blur-[40px] pointer-events-none"></div>

      <div class="relative z-10">
        <div class="text-center mb-10">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white text-2xl shadow-xl shadow-brand-500/30 mx-auto mb-6">
            <i class="fas fa-user"></i>
          </div>
          <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Welcome Back</h1>
          <p class="text-slate-400">Sign in to continue to RichStruct</p>
        </div>
        
        <form method="post" action="{{ url_for('login') }}" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2" for="username">Username</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-user text-slate-500"></i>
              </div>
              <input id="username" name="username" type="text" placeholder="Enter your username" required
                class="w-full pl-11 pr-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2" for="password">Password</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-lock text-slate-500"></i>
              </div>
              <input id="password" name="password" type="password" placeholder="Enter your password" required
                class="w-full pl-11 pr-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all">
            </div>
          </div>

          <button type="submit"
            class="w-full bg-brand-500 text-white py-3.5 rounded-xl font-semibold shadow-lg shadow-brand-500/25 hover:bg-brand-600 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 mt-4">
            <span>Sign In</span>
            <i class="fas fa-arrow-right text-sm"></i>
          </button>

          <div class="mt-8 text-center text-sm text-slate-400">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="text-brand-400 font-medium hover:text-brand-300 hover:underline transition-colors ml-1">Create Account</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
