<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RichStruct</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen font-sans text-white overflow-hidden">

  <!-- Video Background -->
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <video autoplay muted loop playsinline class="w-full h-full object-cover">
      <source src="https://media.istockphoto.com/id/2191087265/video/close-up-display-of-technical-coding-scripts-on-a-screen.mp4?s=mp4-640x640-is&k=20&c=dK1JVV6IccTOpa5lYxyMEijzitOpIl9xbpMhH5GS-cg=">
    </video>
    <div class="absolute inset-0 bg-black/70"></div>
  </div>

  <!-- Login Card -->
  <div class="bg-white text-black p-10 rounded-2xl shadow-2xl w-96 text-center backdrop-blur-lg">
    <h1 class="text-3xl font-bold text-indigo-600 mb-6">RichStruct Login</h1>

    <input id="user" type="text" placeholder="Username"
      class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <input id="pass" type="password" placeholder="Password"
      class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <button onclick="login()"
      class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
      Login
    </button>

    <!-- Register Button -->
    <button onclick="goRegister()"
      class="w-full mt-4 border border-indigo-600 text-indigo-600 py-3 rounded-lg font-semibold hover:bg-indigo-600 hover:text-white transition">
      Create Account
    </button>

    <p id="msg" class="mt-4 text-sm"></p>
  </div>

  <script>
    function login(){
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;
      const msg = document.getElementById('msg');

      if(u === "admin" && p === "1234"){
        msg.style.color = "lightgreen";
        msg.textContent = "Login successful! Redirecting...";
        setTimeout(()=>{
          window.location.href = "index.html";
        },1000);
      }
      else{
        msg.style.color = "salmon";
        msg.textContent = "Invalid username or password";
      }
    }

    function goRegister(){
      window.location.href = "/register";
    }
  </script>

</body>
</html>
