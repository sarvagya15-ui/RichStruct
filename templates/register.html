{% extends 'base.html' %}

{% block title %}Register — SchemaGemPro{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] animate-fade-in-up">
  <div class="relative group w-full max-w-md">
    <!-- Glow effect behind card -->
    <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-indigo-500 rounded-3xl blur opacity-25 group-hover:opacity-40 transition duration-1000 group-hover:duration-200"></div>
    
    <div class="relative bg-slate-900/60 backdrop-blur-xl border border-white/10 p-10 rounded-3xl shadow-2xl">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Create Account</h1>
        <p class="text-slate-400">Join SchemaGemPro to start generating schemas</p>
      </div>

      <form method="POST" action="/register" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Username</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
              <i class="fas fa-user"></i>
            </div>
            <input id="username" name="username" type="text" placeholder="Choose a username" required
              class="w-full pl-10 pr-4 py-3 bg-slate-950/50 border border-white/10 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-white placeholder-slate-500 transition-colors">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
              <i class="fas fa-envelope"></i>
            </div>
            <input id="email" name="email" type="email" placeholder="Enter your email" required
              class="w-full pl-10 pr-4 py-3 bg-slate-950/50 border border-white/10 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-white placeholder-slate-500 transition-colors">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
              <i class="fas fa-lock"></i>
            </div>
            <input id="password" name="password" type="password" placeholder="Create a strong password" required
              class="w-full pl-10 pr-4 py-3 bg-slate-950/50 border border-white/10 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-white placeholder-slate-500 transition-colors">
          </div>
        </div>

        <button type="submit"
          class="w-full bg-cyan-600 text-white py-3 rounded-xl font-semibold shadow-[0_0_15px_rgba(6,182,212,0.3)] hover:bg-cyan-500 hover:shadow-[0_0_25px_rgba(6,182,212,0.5)] transition-all">
          Register
        </button>
      </form>

      <div class="mt-8 text-center text-sm text-slate-400">
        Already have an account? 
        <a href="/login" class="text-cyan-400 font-semibold hover:text-cyan-300 transition-colors">Sign in here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
